
testT1742:
    description: "Verify that the Post commission rate can be Batch setting to a Fix value"
    test_step:
        open: "https://release.pear.us/lindazhoupromoter1"
        sleep_after_open: 5000
        R_click_my_shop: { role: 'button', name: 'My shop' }
        R_click_product: { role: 'button', name: 'Image of Product test 7995' }
        R_click_product_first: { role: 'button', name: 'Image of Product test 7995', index: 0 }
        R_click_commerce: { role: 'tab', name: 'Commerce' }
        R_click_customize: { role: 'button', name: 'Customize products' }
        R_click_batch_set: { role: 'button', name: 'Batch set commission rates' }
        fill_commission: { placeholder: 'e.g., 5', value: '10' }
        R_click_confirm: { role: 'button', name: 'Confirm' }
        R_click_save: { role: 'button', name: 'Save' }
        R_click_customize_again: { role: 'button', name: 'Customize products' }
        R_click_save_again: { role: 'button', name: 'Save' }
        R_click_update: { role: 'button', name: 'Update' }
        sleep_end: 3000
    expect_result:
        description: "Commission rate should be updated"
        assertions:
          - assertion_type: "element_visible_by_text"
            text: "Update"
