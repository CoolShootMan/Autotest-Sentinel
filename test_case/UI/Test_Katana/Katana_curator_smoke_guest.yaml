testT9999:
    description: "Verify guest can submit the Auto test Form on demi-release page"
    test_step:
        open_demi_release:
            url: "https://release.pear.us/demi-release"
        R_click_auto_test_form:
            role: "button"
            name: "Auto test Form test subtitle"
        fill_short_text:
            locator: 'input[name="afe285e3-3637-4821-846c-aa489aeafd32"]'
            value: "short msg"
        fill_long_text:
            locator: 'textarea[name="4dd51c09-dad5-42ba-962a-2f6377260173"]'
            value: "long mesg"
        fill_email:
            role: "textbox"
            name: "Enter your email address"
            value: "email@email.com"
        fill_phone:
            role: "textbox"
            name: "Phone number"
            value: "2313223211"
        upload_media:
            text: "Add media"
            file_path: "data/test imag.jpeg"
        R_click_choose_date:
            role: "textbox"
            name: "Choose date"
        click_date_12:
            role: "gridcell"
            name: "12"
        click_ok:
            role: "button"
            name: "OK"
        check_yes:
            role: "radio"
            name: "Yes"
        check_2:
            role: "checkbox"
            name: "2"
        check_3:
            role: "checkbox"
            name: "3"
        fill_name:
            locator: 'input[name="d4f72645-f096-47e0-96f4-49f4ce83d16b"]'
            value: "afeiship"
        fill_field1:
            locator: 'input[name="4ccd5f77-1751-410a-b359-b77de1828e60"]'
            value: "test"
        fill_field2:
            locator: 'input[name="faeede48-2065-46bb-990b-1e9731957d15"]'
            value: "laogo"
        fill_field3:
            locator: 'input[name="ef2cc012-9b08-4b31-9126-06f7e4ccc06b"]'
            value: "xxx"
        fill_field4:
            locator: 'input[name="6a22b6f0-eeeb-41ba-8e26-e516187335f1"]'
            value: "yyy"
        fill_field5:
            locator: 'input[name="8ad4be74-e07e-48cf-b167-e019d04527b4"]'
            value: "test"
        fill_field6:
            locator: 'input[name="bacb6b39-f319-414b-a8d8-c7ed243719d0"]'
            value: "sdfsdf"
        R_click_submit:
            role: "button"
            name: "Submit"
    expect_result:
        description: "Form should be submitted successfully with Got it confirmation"
        assertions:
          - assertion_type: "element_visible_by_text"
            text: "Got it"

