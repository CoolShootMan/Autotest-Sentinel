# ============================================
# Cookie Injection & Multi-Session Best Practices
# ============================================
# This file demonstrates best practices for:
# 1. Optimized cookie injection (open + cookie_file)
# 2. Session Namespace for multi-user testing
# 3. Proper test data dependencies
#
# Key improvements:
# - Cookies injected BEFORE page load (50%+ faster)
# - Clear session separation with namespace prefix
# - Auto-handling of multi-step modals
# ============================================

# ============================================================================
# Example 1: Basic optimized cookie injection
# ============================================================================
testE1001_basic_cookie_optimization:
  description: "Optimized cookie injection - Load cookies BEFORE opening page"
  test_step:
    # ✨ NEW: Open with cookies in ONE step (faster!)
    open:
      url: "{BASE_URL}/autotestshop"
      cookie_file: "test_case/UI/Test_Katana/cookie_release.json"

    # Page loads already authenticated - no reload needed!
    verify_logged_in:
      verify_text_visible:
        text: "Dashboard"
        exact: false

# ============================================================================
# Example 2: Multi-user testing with Session Namespace (Best Practice!)
# ============================================================================
testE1002_multi_user_session_isolation:
  description: "Partner and Co-seller session isolation with optimized cookies"
  test_step:
    # ========================================
    # Partner Session - Create and configure module
    # ========================================
    # ✨ Cookies injected before page opens - Partner is already logged in
    partner__open:
      url: "{BASE_URL}/autotestshop"
      cookie_file: "test_case/UI/Test_Katana/cookie_partner_release.json"

    # Auto-handle modals (multi-step tours handled automatically)
    # Cookie Banner → Welcome Tour (all steps) → Notifications
    partner__R_click_module_btn: { role: "button", name: "Module" }
    partner__sleep_wait: 1000

    partner__fill_module_title:
      role: "textbox"
      name: "Enter title of the module"
      value: "Partner Events Module"
    partner__R_click_continue: { role: "button", name: "Continue" }
    partner__sleep_wait: 1000

    partner__check_events: { role: "radio", name: "Events" }
    partner__R_click_add: { role: "button", name: "Add" }
    partner__sleep_after_add: 3000

    # Partner creates an event post
    partner__R_click_add_event: { role: "button", name: "Add from my events" }
    partner__sleep_wait: 2000

    # Select the first event
    partner__R_click_first_event:
      locator: "[data-track-location='Dialog'] [data-testid='mui-card-action-area']"
      index: 0
    partner__R_click_add_event_confirm: { role: "button", name: "Add", index: -1 }
    partner__sleep_after_add: 3000

    # ========================================
    # Co-seller Session - Verify restricted access
    # ========================================
    # ✨ Cookies injected before page opens - Co-seller is already logged in
    coseller__open:
      url: "{BASE_URL}/your-business-name-yuu7"
      cookie_file: "test_case/UI/Test_Katana/cookie_partner_coseller_release.json"

    # Auto-handle modals specific to co-seller
    coseller__verify_dashboard_visible:
      verify_text_visible:
        text: "Dashboard"
        exact: false

    # ========================================
    # Cross-session verification
    # ========================================
    # Partner verifies the event is visible
    partner__verify_event_visible:
      verify_text_visible:
        text: "Test Event"
        exact: false

    # Co-seller should NOT see Partner's private event (data isolation)
    coseller__verify_no_private_event:
      verify_element_not_contains_text:
        locator: "div"
        text: "Test Event"
        container: "Partner Events Module"

# ============================================================================
# Example 3: testT5105 - Co-seller auto-archive verification (BEST PRACTICE)
# ============================================================================
# This is the CORRECTED version of testT5105 with:
# - Proper event title matching
# - Optimized cookie injection
# - Clear session separation
# ============================================================================
testE1003_coseller_auto_archive_best_practice:
  description: "Verify co-seller auto-archive of completed event posts (Best Practice)"
  test_step:
    # ========================================
    # PREREQUISITE: Run testT4556 first to create the event!
    # testT4556 creates event: "Test-event-Auto-archive"
    # ========================================

    # ========================================
    # Partner Session - Mark event as completed
    # ========================================
    # ✨ Optimized: Cookies injected before opening page
    partner__open:
      url: "{BASE_URL}/autotestshop"
      cookie_file: "test_case/UI/Test_Katana/cookie_partner_release.json"

    # Auto-handle modals (Cookie banner, Welcome tour, etc.)
    # All multi-step modals handled automatically!

    # Navigate to the event and mark as completed
    partner__click_module_event:
      click_module_post_view_event_cta:
        module_name: "Upcoming Events"
        post_title: "Test-event-Auto-archive"  # ✅ CORRECT: Matches testT4556

    partner__sleep_wait: 2000

    partner__R_click_edit: { role: "button", name: "Edit event" }
    partner__sleep_wait: 2000

    # Change status to "Completed"
    partner__R_click_status_dropdown:
      locator: "[data-testid='KeyboardArrowDownIcon']"
      index: 0

    partner__R_click_completed:
      locator: "li[data-testid='menu-item']"
      name: "Completed"
      exact: true

    partner__sleep_wait: 2000

    partner__R_click_mark_completed_confirm:
      role: "button"
      name: "Mark as Completed"
      exact: true

    partner__R_click_save: { role: "button", name: "Save" }
    partner__sleep_wait: 2000

    # ========================================
    # Co-seller Session - Verify event is auto-archived
    # ========================================
    # ✨ Optimized: Different cookie file for co-seller
    coseller__open:
      url: "{BASE_URL}/your-business-name-yuu7"
      cookie_file: "test_case/UI/Test_Katana/cookie_partner_coseller_release.json"

    # Auto-handle modals for co-seller

    # Verify the completed event is NOT visible in "Upcoming Events"
    # (Auto-archive should have moved it away)
    coseller__verify_event_archived:
      verify_element_not_contains_text:
        locator: "div"
        text: "Test-event-Auto-archive"
        container: "Upcoming Events"

    # Verify the event might be in "Past Events" or archived section
    coseller__verify_archived_section:
      wait_for_selector:
        selector: "[data-testid='module']"
        timeout: 5000

  expect_result:
    description: "Completed event should be auto-archived and not visible in Upcoming Events"
    assertions:
      - assertion_type: "element_visible_by_text"
        text: "Dashboard"

# ============================================================================
# Example 4: E-commerce workflow - Buyer and Seller
# ============================================================================
testE1004_ecommerce_buyer_seller_workflow:
  description: "Complete e-commerce workflow with optimized multi-session testing"
  test_step:
    # ========================================
    # Seller Session - Add product
    # ========================================
    seller__open:
      url: "{BASE_URL}/seller"
      cookie_file: "cookies/seller_release.json"

    # Auto-handle seller modals
    seller__R_click_add_product: { role: "button", name: "Add Product" }
    seller__sleep_wait: 1000

    seller__fill_product_name:
      name: "product_name"
      value: "Wireless Headphones"

    seller__fill_price:
      name: "price"
      value: "99.99"

    seller__fill_description:
      name: "description"
      value: "High-quality wireless headphones with noise cancellation"

    seller__R_click_publish: { role: "button", name: "Publish" }
    seller__sleep_wait: 2000

    seller__verify_published:
      verify_text_visible:
        text: "Product published"
        exact: false

    # ========================================
    # Buyer Session - Browse and purchase
    # ========================================
    buyer__open:
      url: "{BASE_URL}/shop"
      cookie_file: "cookies/buyer_release.json"

    # Auto-handle buyer modals
    buyer__fill_search:
      name: "search"
      value: "Wireless Headphones"

    buyer__R_click_search: { role: "button", name: "Search" }
    buyer__sleep_wait: 2000

    buyer__wait_for_product:
      wait_for_selector:
        selector: ".product-card"
        timeout: 5000

    buyer__R_click_product: { role: "link", name: "Wireless Headphones" }
    buyer__sleep_wait: 1000

    buyer__verify_product_page:
      verify_text_visible:
        text: "Wireless Headphones"
        exact: false

    buyer__R_click_buy_now: { role: "button", name: "Buy Now" }
    buyer__sleep_wait: 1000

    buyer__R_click_confirm: { role: "button", name: "Confirm Order" }
    buyer__sleep_wait: 2000

    buyer__verify_order_confirmed:
      verify_text_visible:
        text: "Order confirmed"
        exact: false

    # ========================================
    # Seller Session - View new order
    # ========================================
    seller__R_click_orders: { role: "button", name: "Orders" }
    seller__sleep_wait: 1000

    seller__verify_new_order:
      verify_text_visible:
        text: "New Order"
        exact: false

    seller__R_click_view_order: { role: "button", name: "View", index: 0 }
    seller__sleep_wait: 1000

    seller__verify_order_details:
      verify_text_visible:
        text: "Wireless Headphones"
        exact: false

    seller__fill_tracking:
      name: "tracking_number"
      value: "TRACK123456789"

    seller__R_click_ship: { role: "button", name: "Mark as Shipped" }
    seller__sleep_wait: 1000

    seller__verify_shipped:
      verify_text_visible:
        text: "Shipped"
        exact: false

    # ========================================
    # Buyer Session - Verify shipping info
    # ========================================
    buyer__R_click_my_orders: { role: "button", name: "My Orders" }
    buyer__sleep_wait: 1000

    buyer__verify_tracking_visible:
      verify_text_visible:
        text: "TRACK123456789"
        exact: false

    buyer__verify_status:
      verify_text_visible:
        text: "Shipped"
        exact: false

# ============================================================================
# Example 5: Performance comparison - Old vs New approach
# ============================================================================
testE1005_performance_comparison_old_way:
  description: "OLD WAY - Slower (2 page loads)"
  test_step:
    # Step 1: Open page (not logged in)
    open: "{BASE_URL}/dashboard"

    # Step 2: Inject cookies
    inject_cookies:
      cookie_file: "test_case/UI/Test_Katana/cookie_release.json"

    # Step 3: Page reloads automatically (wasted time!)
    # ⚠️ Total: 2 page loads, ~4-6 seconds

    verify_loaded:
      verify_text_visible:
        text: "Dashboard"
        exact: false

testE1006_performance_comparison_new_way:
  description: "NEW WAY - Faster (1 page load) ⚡"
  test_step:
    # ✨ Single step: Cookies injected + Page opens (already authenticated)
    open:
      url: "{BASE_URL}/dashboard"
      cookie_file: "test_case/UI/Test_Katana/cookie_release.json"

    # ✅ Page loads once, already logged in!
    # ⚡ Total: 1 page load, ~2-3 seconds (50%+ faster!)

    verify_loaded:
      verify_text_visible:
        text: "Dashboard"
        exact: false

# ============================================================================
# Example 6: Error handling - Graceful degradation
# ============================================================================
testE1007_error_handling_missing_cookie:
  description: "Graceful handling when cookie file is missing"
  test_step:
    # If cookie file doesn't exist, logs warning but continues
    open:
      url: "{BASE_URL}/dashboard"
      cookie_file: "cookies/nonexistent.json"

    # ⚠️ Warning logged, but test continues with unauthenticated session
    # This allows tests to continue even without cookies

    # Verify page loaded (even without authentication)
    verify_page_loaded:
      wait_for_selector:
        selector: "body"
        timeout: 5000

# ============================================================================
# Example 7: Mixed authentication scenarios
# ============================================================================
testE1008_mixed_auth_scenarios:
  description: "Test with both authenticated and guest sessions"
  test_step:
    # Admin - Logged in
    admin__open:
      url: "{BASE_URL}/admin"
      cookie_file: "cookies/admin_release.json"

    admin__verify_admin_panel:
      verify_text_visible:
        text: "Admin Panel"
        exact: false

    admin__verify_advanced_settings:
      verify_text_visible:
        text: "Advanced Settings"
        exact: false

    # Guest - Not logged in (no cookie_file)
    guest__open: "{BASE_URL}/shop"

    guest__verify_public_access:
      verify_text_visible:
        text: "Welcome"
        exact: false

    # Guest should NOT see admin options
    guest__verify_no_admin:
      verify_element_not_contains_text:
        locator: "nav"
        text: "Admin"

