# ------------------ Module - carousel nav buttons ------------------------
testT4600_4602:
    description: "Verify carousel module horizontal scroll navigation: links slide by one link width on next/prev, next button hidden at last element, nav buttons only visible on hover"
    test_step:
        open: "{BASE_URL}/autotestshop"
        swipe_avoid_plus: { x: 0, y: 300 }
        sleep_after_open: 5000

        # Step 1: Create module with General Link + Carousel type
        # This creates the LAST module on the page, ensuring we operate on the correct one
        R_click_module: { role: 'button', name: 'Module' }
        sleep_after_module_click: 2000
        fill_module_title: { role: 'textbox', name: 'Enter title of the module', value: 'test nav buttons' }
        R_click_continue: { role: 'button', name: 'Continue' }
        sleep_before_select: 2000
        click_general_link: { text: "General Link", exact: true }
        sleep_before_type_select: 2000
        check_carousel: { role: 'radio', name: 'Carousel Carousel' }
        sleep_before_add: 2000
        R_click_add_1: { locator: "//*[@data-testid='button']", text: "Add", exact: true }
        sleep_after_add_module: 3000

        # Step 2: Add 3 links to the last module (click_module_add_new targets last matching module)
        # Link 1: title1
        click_module_add_new_1: { module_name: 'test nav buttons' }
        sleep_wait_form_1: 1500
        fill_url_1: { locator: 'input[name="url"]', value: 'baidu.com' }
        fill_title_1: { placeholder: 'As the bold title on your', value: 'title1' }
        R_click_add_link_1: { locator: "//*[@data-testid='button']", text: "Add", exact: true }
        sleep_after_add_link_1: 3000

        # Link 2: title2
        click_module_add_new_2: { module_name: 'test nav buttons' }
        sleep_wait_form_2: 1500
        fill_url_2: { locator: 'input[name="url"]', value: 'baidu.com' }
        fill_title_2: { placeholder: 'As the bold title on your', value: 'title2' }
        R_click_add_link_2: { locator: "//*[@data-testid='button']", text: "Add", exact: true }
        sleep_after_add_link_2: 3000

        # Link 3: title3
        click_module_add_new_3: { module_name: 'test nav buttons' }
        sleep_wait_form_3: 1500
        fill_url_3: { locator: 'input[name="url"]', value: 'baidu.com' }
        fill_title_3: { placeholder: 'As the bold title on your', value: 'title3' }
        R_click_add_link_3: { locator: "//*[@data-testid='button']", text: "Add", exact: true }
        sleep_after_add_link_3: 3000

        # Step 3: Verify carousel scroll behavior
        # - Hover over module to reveal nav buttons
        # - Click next: verify scroll distance = one link card width
        # - Click prev: verify scroll distance = one link card width (smooth back)
        # - Navigate to last element: verify next button is hidden
        verify_carousel_scroll_module:
            module_name: 'test nav buttons'
            link_item_selector: 'a'
            tolerance: 10

    expect_result:
        description: "Verify carousel navigation: clicking next/prev slides content by exactly one link width, next button hidden at last element, nav buttons only visible on hover"
        assertions:
            - assertion_type: "element_visible_by_text"
              text: "test nav buttons"
            - assertion_type: "element_visible_by_text"
              text: "title1"
            - assertion_type: "element_visible_by_text"
              text: "title2"
            - assertion_type: "element_visible_by_text"
              text: "title3"

    teardown_step:
        # Delete the module after verification (cleanup)
        click_module_edit_button_del: { module_name: 'test nav buttons' }
        R_click_delete_module: { role: 'button', name: 'Delete module' }
        sleep_after_delete_click: 1500
        click_confirm_delete: { locator: "[role='dialog'] [data-track-location='Dialog']", name: 'Delete', exact: true }
        sleep_after_confirm_delete: 5000

