# T2705: Partner hides the variant and sets the default variant
testT2705_VerifyPartner:
  guest: false
  description: "Partner hides the variant and sets the default variant on the management page"
  test_step:
    # Step 1: Open Events list page
    open: "{BASE_URL}/events"
    sleep_after_open: 5000

    # Step 2: Find and click "Test event post variant settings" event
    R_click_event: { locator: "text=Test event post variant settings", exact: true }
    sleep_step: 4000

    # Step 2.1: Scroll down to reveal post card
    swipe_avoid_plus: { x: 0, y: 500 }
    sleep_step: 1000

    # Step 3: Click post card to enter post landing page
    R_click_post_card: { role: "button", name: "test-event-post-variant-settings", index: 0 }
    sleep_step: 3000

    # Step 3.1: Click "Edit post" button
    R_click_edit_post: { role: "button", name: "Edit post" }
    sleep_step: 3000

    # Step 3.2: Click "Style" tab in Edit post dialog
    R_click_style_tab: { role: "tab", name: "Style" }
    sleep_step: 2000

    # Step 3.3: Click Layout dropdown and select "Collection"
    R_click_layout_dropdown: { locator: "[role='combobox']" }
    sleep_step: 1000
    R_click_collection_option: { locator: "text=Collection" }
    sleep_step: 1000

    # Step 3.4: Click "Update" to save Edit post changes
    R_click_update: { role: "button", name: "Update" }
    sleep_step: 3000

    # Step 4: Click Selling tab
    R_click_selling_tab: { role: "tab", name: "Selling" }
    sleep_step: 2000

    # Step 5: Click Customize products
    R_click_customize: { role: "button", name: "Customize products" }
    sleep_before_scroll: 2000

    # Scroll down the drawer to reveal the variants table
    swipe_avoid_plus: { x: 0, y: 500 }
    sleep_before_horizontal_scroll: 1000

    # Scroll the variant table to the right
    swipe_right: { x: 800, y: 0 }
    sleep_after_scroll: 1000

    # The exclude checkbox for '5 people' (1st column checkbox, index=0)
    check_exclude: { locator: "xpath=//tr[descendant::*[contains(text(), '5 people')]]//input[@type='checkbox']", index: 0 }

    # The default variant checkbox for '9 people' (2nd column checkbox, index=1)
    check_default: { locator: "xpath=//tr[descendant::*[contains(text(), '9 people')]]//input[@type='checkbox']", index: 1 }

    # Save and Save1
    R_click_save: { role: "button", name: "Save" }
    R_click_save1: { role: "button", name: "Save" }
    sleep_after_update: 5000

  expect_result:
    description: "Curator successfully saves the operation"
    assertions:
      - assertion_type: "element_visible_by_text"
        text: "Post products updated"

# Separate verification for Guest
testT2705_VerifyGuest:
  guest: true
  description: "Verify that '5 people' variant is hidden and '9 people' variant is the default variant for guest users after curator action"
  test_step:
    open: "{BASE_URL}/autotestshop/post/test-event-post-variant-settings"
    sleep_after_open: 5000

    # Click product card to open product drawer
    R_click_product_card: { role: "img", name: "Image of Product", index: 0 }
    sleep_step: 2000

    # Scroll down to the variant section in the detail page
    swipe_to_variant: { x: 0, y: 600 }

  expect_result:
    description: "The variant '5 people' should be completely hidden and '9 people' variant should be the default variant"
    assertions:
      - assertion_type: "element_not_visible_by_text"
        text: "5 people"
      - assertion_type: "element_not_visible_by_text"
        text: "5people"
      - assertion_type: "element_visible_by_text"
        text: "9 people"

  teardown_step:
    # Step 1: Inject partner cookies
    add_cookies: {}
    sleep_step: 1000

    # Step 2: Open Events list page
    open: "{BASE_URL}/events"
    sleep_step: 5000

    # Step 3: Find and click "Test event post variant settings" event
    R_click_event: { locator: "text=Test event post variant settings", exact: true }
    sleep_step: 4000

    # Step 2.1: Scroll down to reveal post card
    swipe_reset: { x: 0, y: 500 }
    sleep_step: 1000

    # Step 3: Click post card to enter post landing page
    R_click_post_card: { role: "button", name: "test-event-post-variant-settings", index: 0 }
    sleep_step: 3000

    # Step 4: Click Selling tab
    R_click_selling_tab_reset: { role: "tab", name: "Selling" }
    sleep_step: 2000

    # Step 5: Click Customize products
    R_click_customize_reset: { role: "button", name: "Customize products" }
    sleep_step: 2000
    swipe_reset2: { x: 0, y: 500 }
    sleep_step: 1000
    swipe_right_reset: { x: 800, y: 0 }
    sleep_step: 1000
    uncheck_exclude: { locator: "xpath=//tr[descendant::*[contains(text(), '5 people')]]//input[@type='checkbox']", index: 0, checked: false }
    uncheck_default: { locator: "xpath=//tr[descendant::*[contains(text(), '9 people')]]//input[@type='checkbox']", index: 1, checked: false }
    R_click_save_reset: { role: "button", name: "Save" }
    R_click_save_reset1: { role: "button", name: "Save" }
    sleep_step: 4000

