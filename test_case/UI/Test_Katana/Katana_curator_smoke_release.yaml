testT3370:
    description: "Verify set the product card alignment at the store level"
    test_step:
        open: "https://release.pear.us/demi-release"
        swipe_avoid_plus: { x: 0, y: 300 }
        sleep_init: 1000
        goto_storefront_top_aligned:
            url: "https://release.pear.us/storefront-modules#Storefront"
            timeout: 30000
        check_label_top_aligned:
            label: "Top aligned"
            timeout: 15000
        publish_button_click_top_aligned: {}
        verify_navigation_after_publish_top_aligned:
            url_regex: "https://release.pear.us/demi-release"
            timeout: 30000
            warning_message: "Shop page redirect after publish timed out. Directly navigating to Shop page."
            fallback_url: "https://release.pear.us/demi-release"
            fallback_timeout: 30000
        click_mui_svg_icon_top_aligned: { locator: 'svg[data-testid="StorefrontIcon"]', name: 'Storefront nav icon' }
        click_products_text_top_aligned: {}
        wait_for_product_cards_top_aligned:
            index: 1
            timeout: 6000
        verify_top_aligned_layout:
            timeout: 6000
            screenshot_path: "recordings/top_aligned_failure.png"
            threshold: 5
        screenshot_final:
            name: "demi_release_page.png"
        goto_storefront_waterfall:
            url: "https://release.pear.us/storefront-modules#Storefront"
            timeout: 30000
        check_label_waterfall:
            label: "Waterfall"
            timeout: 15000
        publish_button_click_waterfall: {}
        verify_navigation_after_publish_waterfall:
            url_regex: "https://release.pear.us/demi-release"
            timeout: 30000
            warning_message: "Shop page redirect after publish timed out. Directly navigating to Shop page."
            fallback_url: "https://release.pear.us/demi-release"
            fallback_timeout: 30000
        click_mui_svg_icon_waterfall: {}
        click_products_text_waterfall: {}
        wait_for_product_cards_waterfall:
            index: 1
            timeout: 6000
        verify_waterfall_layout:
            url_regex: "https://release.pear.us/demi-release"
            timeout: 30000
            warning_message: "Shop page redirect after publish timed out. Directly navigating to Shop page."
            fallback_url: "https://release.pear.us/demi-release"
            fallback_timeout: 30000
            wait_for_timeout: 1500
            wait_for_cards_timeout: 6000
    expect_result:
        description: "Product card alignment should be verified for both Top aligned and Waterfall layouts."
        assertions: []

