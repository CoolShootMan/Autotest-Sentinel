testT4259_guest:
    guest: true
    description: "Verify guest experiences A->B->C auto replacement when purchasing"
    test_step:
        open: "https://demi0214.notip.com.cn/post/auto-test-event"
        sleep_after_open: 5000
        
        # --- Purchase 1 (Consumes General A) ---
        R_click_rsvp_1: { role: 'button', name: 'RSVP', exact: true }
        sleep_after_rsvp_1: 5000
        R_click_checkout_1: { name: 'Checkout', disable_ai: true }
        sleep_after_checkout_1: 3000
        R_click_continue_1: { role: 'button', name: 'Continue', exact: true }
        sleep_after_continue_1: 2000
        fill_first_name_1: { locator: 'input[name="contact.firstName"]', value: 't1' }
        fill_last_name_1: { locator: 'input[name="contact.lastName"]', value: 't2' }
        fill_phone_1: { role: 'textbox', name: 'Phone number', value: '(234) 567-8900' }
        fill_email_1: { locator: 'input[name="contact.email"]', value: 'yuxiao.zhu.ext@1m.app' }
        sleep_before_place_order_1: 1500
        R_click_place_order_1: { role: 'button', name: 'Place order' }
        sleep_after_place_order_1: 8000
        open_pdp_1: "https://demi0214.notip.com.cn/post/auto-test-event"
        sleep_after_reload_1: 5000
        verify_b_visible: { assertion_type: 'element_visible_by_text', text: 'General B' }
        
        # --- Purchase 2 (Consumes General B) ---
        R_click_rsvp_2: { role: 'button', name: 'RSVP', exact: true }
        sleep_after_rsvp_2: 5000
        R_click_checkout_2: { name: 'Checkout', disable_ai: true }
        sleep_after_checkout_2: 3000
        R_click_continue_2: { role: 'button', name: 'Continue', exact: true }
        sleep_after_continue_2: 2000
        fill_first_name_2: { locator: 'input[name="contact.firstName"]', value: 't1' }
        fill_last_name_2: { locator: 'input[name="contact.lastName"]', value: 't2' }
        fill_phone_2: { role: 'textbox', name: 'Phone number', value: '(234) 567-8900' }
        fill_email_2: { locator: 'input[name="contact.email"]', value: 'yuxiao.zhu.ext@1m.app' }
        sleep_before_place_order_2: 1500
        R_click_place_order_2: { role: 'button', name: 'Place order' }
        sleep_after_place_order_2: 10000
        open_pdp_2: "https://demi0214.notip.com.cn/post/auto-test-event"
        sleep_after_reload_2: 5000
        
