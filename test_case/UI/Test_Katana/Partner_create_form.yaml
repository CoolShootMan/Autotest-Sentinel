testPartner_create_form:
  is_mobile: true
  description: "Create a complete form"
  test_step:
    open: "https://release.pear.us/demi-release"
    sleep_open: 3000

    click_add_new_form: { role: 'button', name: 'Add new', locator: "div:has(> *:text-is('Forms'))" }
    sleep_add: 3000

    fill_title: { role: 'textbox', name: 'Enter a title', value: 'Partner_create_form' }
    fill_subtitle: { role: 'textbox', name: 'Enter subtitle', value: 'test subtitle' }
    fill_description: { role: 'textbox', name: 'Enter a description', value: 'Description' }

    # 1. Short text
    click_add_field_1: { role: 'button', name: 'Add new field', exact: true }
    sleep_1: 500
    fill_field_title_1: { role: 'textbox', name: 'Enter title of the field', value: 'short' }
    click_add_1: { role: 'button', name: 'Add' }

    # 2. Long text (Paragraph)
    click_add_field_2: { role: 'button', name: 'Add new field', exact: true }
    sleep_2: 500
    click_paragraph: { text: 'Paragraph', exact: true }
    fill_field_title_2: { role: 'textbox', name: 'Enter title of the field', value: 'long' }
    click_add_2: { role: 'button', name: 'Add' }

    # 3. Email
    click_add_field_3: { role: 'button', name: 'Add new field', exact: true }
    sleep_3: 500
    click_email: { text: 'Email address', exact: true }
    click_add_3: { role: 'button', name: 'Add' }

    # 4. Phone
    click_add_field_4: { role: 'button', name: 'Add new field', exact: true }
    sleep_4: 500
    click_phone: { text: 'Phone number', exact: true }
    click_add_4: { role: 'button', name: 'Add' }

    # 5. Media
    click_add_field_5: { role: 'button', name: 'Add new field', exact: true }
    sleep_5: 500
    click_media: { text: 'Media', exact: true }
    fill_media_title: { role: 'textbox', name: 'Enter title of the field', value: 'Add Media' }
    fill_media_limit: { role: 'spinbutton', value: '1' }
    click_add_5: { role: 'button', name: 'Add' }

    # 6. Date and time
    click_add_field_6: { role: 'button', name: 'Add new field', exact: true }
    sleep_6: 500
    click_datetime: { text: 'Date and time', exact: true }
    click_add_6: { role: 'button', name: 'Add' }

    # 7. Single choice
    click_add_field_7: { role: 'button', name: 'Add new field', exact: true }
    sleep_7: 500
    click_single_choice: { role: 'text', name: 'Single choice', locator: "div:has(> *:text-is('Single choice'))" }
    fill_single_title: { role: 'textbox', name: 'Enter title of the field', value: 'are you happy?' }
    fill_single_opt1: { locator: 'input[placeholder="Enter option"]', index: 0, value: 'Yes' }
    fill_single_opt2: { locator: 'input[placeholder="Enter option"]', index: 1, value: 'No' }
    click_add_7: { role: 'button', name: 'Add', exact: true }

    # 8. Multiple choice
    click_add_field_8: { role: 'button', name: 'Add new field', exact: true }
    sleep_8: 500
    click_multiple_choice: { role: 'text', name: 'Multiple choice', locator: "div:has(> *:text-is('Multiple choice'))" }
    fill_multi_title: { role: 'textbox', name: 'Enter title of the field', value: 'Multiple' }
    click_add_multi_opt: { role: 'button', name: 'Add option' }
    fill_multi_opt1: { locator: 'input[placeholder="Enter option"]', index: 0, value: '1' }
    fill_multi_opt2: { locator: 'input[placeholder="Enter option"]', index: 1, value: '2' }
    fill_multi_opt3: { locator: 'input[placeholder="Enter option"]', index: 2, value: '3' }
    click_add_8: { role: 'button', name: 'Add', exact: true }

    # 9. Social - Instagram
    click_add_field_9: { role: 'button', name: 'Add new field', exact: true }
    sleep_9: 500
    click_social_1: { text: 'Social', exact: true }
    click_social_combo_1: { role: 'combobox' }
    click_insta: { role: 'option', name: 'Instagram' }
    click_add_9: { role: 'button', name: 'Add' }

    # 10. Social - Facebook
    click_add_field_10: { role: 'button', name: 'Add new field', exact: true }
    sleep_10: 500
    click_social_2: { text: 'Social', exact: true }
    click_social_combo_2: { role: 'combobox' }
    click_fb: { role: 'option', name: 'Facebook' }
    click_add_10: { role: 'button', name: 'Add' }

    # 11. Social - TikTok
    click_add_field_11: { role: 'button', name: 'Add new field', exact: true }
    sleep_11: 500
    click_social_3: { text: 'Social', exact: true }
    click_social_combo_3: { role: 'combobox' }
    click_tiktok: { role: 'option', name: 'TikTok' }
    click_add_11: { role: 'button', name: 'Add' }

    # 12. Social - X
    click_add_field_12: { role: 'button', name: 'Add new field', exact: true }
    sleep_12: 500
    click_social_4: { text: 'Social', exact: true }
    click_social_combo_4: { role: 'combobox' }
    click_x: { role: 'option', name: 'X', exact: true }
    click_add_12: { role: 'button', name: 'Add' }

    # 13. Social - YouTube
    click_add_field_13: { role: 'button', name: 'Add new field', exact: true }
    sleep_13: 500
    click_social_5: { text: 'Social', exact: true }
    click_social_combo_5: { role: 'combobox' }
    click_yt: { role: 'option', name: 'YouTube' }
    click_add_13: { role: 'button', name: 'Add' }

    # 14. Social - Linkedin
    click_add_field_14: { role: 'button', name: 'Add new field', exact: true }
    sleep_14: 500
    click_social_6: { text: 'Social', exact: true }
    click_social_combo_6: { role: 'combobox' }
    click_linkedin: { role: 'option', name: 'Linkedin' }
    click_add_14: { role: 'button', name: 'Add' }

    # 15. Social - Threads (Unrequired)
    click_add_field_15: { role: 'button', name: 'Add new field', exact: true }
    sleep_15: 500
    click_social_7: { text: 'Social', exact: true }
    click_social_combo_7: { role: 'combobox' }
    click_threads: { role: 'option', name: 'Threads' }
    check_required: { role: 'checkbox', name: 'Required', checked: false }
    click_add_15: { role: 'button', name: 'Add' }

    # Deleting excess options (as in codegen)
    # Using exact codegen steps
    click_view_name_3: { role: 'button', name: 'View Name options', exact: true }
    click_delete_name_3: { role: 'button', name: 'Delete', index: 0 }
    sleep_delete_name_3: 500
    click_delete_name_4: { role: 'button', name: 'Delete', index: 0 }
    sleep_delete_name_4: 500

    click_view_phone: { role: 'button', name: 'View Phone options', exact: true }
    click_delete_phone_1: { role: 'button', name: 'Delete', index: 0 }
    sleep_delete_phone_1: 500
    click_delete_phone_2: { role: 'button', name: 'Delete', index: 0 }
    sleep_delete_phone_2: 500

    click_view_email: { role: 'button', name: 'View Email options', exact: true }
    click_delete_email_1: { role: 'button', name: 'Delete', index: 0 }
    sleep_delete_email_1: 500
    click_delete_email_2: { role: 'button', name: 'Delete', index: 0 }
    sleep_delete_email_2: 500

    # Finalization
    click_preview: { role: 'button', name: 'Preview form', exact: true }
    sleep_preview: 3000
    click_close_preview: { role: 'button', name: 'Close', exact: true }
    sleep_close_preview: 2000

    click_continue: { role: 'button', name: 'Continue' }
    sleep_continue: 1000

    # Custom success message changes
    click_thanks_msg: { role: 'textbox', name: 'Thanks for your submission!' }
    fill_thanks_msg: { role: 'textbox', name: 'Thanks for your submission!', value: 'Hi thank you' }

    click_save: { role: 'button', name: 'Save' }
    sleep_save: 3000

  expect_result:
    description: "Form should be created successfully"
    assertions:
      - assertion_type: "element_visible_by_text"
        text: "Partner_create_form"

test_guest_submission_1:
  guest: true
  is_mobile: true
  description: "Verify guest can submit the Auto test Form on demi-release page"
  test_step:
    open_demi_release:
      url: "https://release.pear.us/demi-release"
    R_click_auto_test_form:
      role: "button"
      name: "Partner_create_form"

    # short answer - realistic business description
    fill_short_text:
      placeholder: "Please fill this out"
      index: 0
      value: "Pear Partner Cooperation Inquiry"

    # long paragraph - realistic long text
    fill_long_text:
      placeholder: "Please fill this out"
      index: 1
      value: "I am interested in establishing a long-term partnership with Pear. My team focuses on content creation and brand promotion, and we hope to collaborate on official events and marketing campaigns."

    # email - realistic business email
    fill_email:
      placeholder: "Enter your email address"
      value: "cooperation.business@gmail.com"

    # phone - realistic US phone number format
    fill_phone:
      placeholder: "Phone number"
      value: "+13105558976"

    # upload media - corrected filename with realistic asset path
    upload_media:
      text: "Add media"
      file_path: "data/test imag.jpeg"

    # date time - select a real date in the current month
    R_click_choose_date:
      role: "textbox"
      name: "Choose date"
    click_date_12:
      role: "gridcell"
      name: "12"
    click_ok:
      role: "button"
      name: "OK"

    # single choice: Yes
    check_yes:
      role: "radio"
      name: "Yes"

    # multiple choice: 1,2
    check_1:
      role: "checkbox"
      name: "1"
    check_2:
      role: "checkbox"
      name: "2"

    # Instagram - realistic username
    fill_instagram:
      locator: 'xpath=//div[text()="Instagram"]/following-sibling::div//input'
      value: "pear_partner_official"

    # Facebook - realistic username
    fill_facebook:
      locator: 'xpath=//div[text()="Facebook"]/following-sibling::div//input'
      wait_for: 2000
      scroll_into_view: true  # 强制滚动到元素
      value: "PearPartnerOfficial"

    # Tiktok - realistic username
    fill_tiktok:
      locator: 'xpath=//div[text()="Tiktok"]/following-sibling::div//input'
      value: "pear_partner"

    # X (Twitter) - realistic username
    fill_x:
      locator: 'xpath=//div[text()="X"]/following-sibling::div//input'
      value: "PearPartnerHQ"

    # Youtube - realistic username
    fill_youtube:
      locator: 'xpath=//div[text()="Youtube"]/following-sibling::div//input'
      value: "PearPartnerChannel"

    # Linkedin - realistic username
    fill_linkedin:
      locator: 'xpath=//div[text()="Linkedin"]/following-sibling::div//input'
      value: "pear-partner-official"

    # Threads - realistic username
    # fill_threads:
    #   locator: 'xpath=//div[text()="Threads"]/following-sibling::div//input'
    #   value: "pear_partner_official"

    # submit
    R_click_submit:
      role: "button"
      name: "Submit"

  expect_result:
    description: "Form should be submitted successfully with Got it confirmation"
    assertions:
      - assertion_type: "element_visible_by_text"
        text: "Got it"

