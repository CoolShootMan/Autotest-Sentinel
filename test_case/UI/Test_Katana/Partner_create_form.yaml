testPartner_verify_commission:
  description: "Verify viewing and exporting user form submissions"
  test_step:
    open: 'https://release.pear.us/curator/submission?formId=0d95efc9-c0ad-441d-b901-dc3b9ee2084d'
    sleep_after_open: 5000

    # Dynamic Count Capture & Search
    capture_total_count: { }
    sleep_before_search: 2000
    fill_search: { role: 'textbox', name: 'Search', value: 'Pear Partner' }
    sleep_search: 2000
    R_click_submission: { text: 'Pear Partner Cooperation Inquiry' }
    sleep_after_open_details: 3000

    # Verify every field in the modal (Comprehensive UI check)
    verify_details_header: { text: 'Submission details' }
    verify_short: { text: 'Pear Partner Cooperation Inquiry' }
    verify_long: { text: 'I am interested in establishing a long-term partnership with Pear' }
    verify_email: { text: 'cooperation.business@gmail.com' }
    verify_phone: { text: '+13105558976' }
    verify_date: { text: 'Sun, Apr 12, 2026 12:00 AM' }
    verify_choice: { text: 'Yes' }
    verify_multi: { text: '1' }
    verify_multi_2: { text: '2' }
    # Social Media fields verification
    verify_instagram: { text: '@pear_partner_official' }
    verify_facebook: { text: '@PearPartnerOfficial' }
    verify_tiktok: { text: '@pear_partner' }
    verify_x: { text: '@PearPartnerHQ' }
    verify_youtube: { text: '@PearPartnerChannel' }
    verify_linkedin: { text: '@pear-partner-official' }
    #verify_threads: { text: '@pear_partner_official' }

    click_submission_details_back: { }
    sleep_after_back: 2000

    # CSV Verification (Export Data)
    download_submission_csv: { name: 'Export all data', role: 'button' }
    verify_csv_data:
      expected_row: {
        'short': 'Pear Partner Cooperation Inquiry',
        'Email address': 'cooperation.business@gmail.com',
        'Phone number': '3105558976',
        'are you happy?': 'Yes',
        'Multiple': '1, 2',
        'Instagram': '@pear_partner_official',
        'Facebook': '@PearPartnerOfficial',
        'Tiktok': '@pear_partner',
        'X': '@PearPartnerHQ',
        'Youtube': '@PearPartnerChannel',
        'Linkedin': '@pear-partner-official',
        #'Threads': '@pear_partner_official'
      }

  expect_result:
    description: "All form submission fields (including social media) should be viewable in UI and accurately exported in CSV, with export count matching UI total count."
    assertions:
      - { assertion_type: 'element_visible_by_text', text: 'Pear Partner Cooperation Inquiry' }