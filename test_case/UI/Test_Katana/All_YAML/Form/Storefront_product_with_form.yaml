    R_click_save_reset_2: { role: 'button', name: 'Save' }
    sleep_after_save_reset_2: 3000
    verify_reset_success: { text: 'Update Success!' }

  expect_result:
    description: "Submission times should display in CST after setting timezone to GMT+8:00"
    assertions: []

