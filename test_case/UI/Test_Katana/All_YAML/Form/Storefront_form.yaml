    # 11. Social - TikTok
    R_click_add_field_11:
      { role: "button", name: "Add new field", exact: true, quick: true }
    sleep_11: 50
    R_click_social_3: { role: "combobox" }
    sleep_click_10: 50
    R_click_select_item_10: { role: "option", name: "Social" }
    R_click_social_combo_3: { role: "combobox", index: 1, quick: true }
    R_click_tiktok: { role: "option", name: "TikTok", quick: true }
    R_click_add_11: { role: "button", name: "Add", quick: true }

    # 12. Social - X
    R_click_add_field_12:
      { role: "button", name: "Add new field", exact: true, quick: true }
    sleep_12: 50
    R_click_social_4: { role: "combobox" }
    sleep_click_11: 50
    R_click_select_item_11: { role: "option", name: "Social" }
