    sleep_15: 50
    R_click_social_7: { role: "combobox" }
    sleep_click_14: 50
    R_click_select_item_14: { role: "option", name: "Social" }
    R_click_social_combo_7: { role: "combobox", index: 1, quick: true }
    R_click_threads: { role: "option", name: "Threads", quick: true }
    check_required: { role: "checkbox", name: "Required", checked: false }
    R_click_add_15: { role: "button", name: "Add", quick: true }

