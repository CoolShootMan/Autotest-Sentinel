    R_click_add_12: { role: "button", name: "Add", quick: true }

    # 13. Social - YouTube
    R_click_add_field_13:
      { role: "button", name: "Add new field", exact: true, quick: true }
    sleep_13: 50
    R_click_social_5: { role: "combobox" }
    sleep_click_12: 50
    R_click_select_item_12: { role: "option", name: "Social" }
    R_click_social_combo_5: { role: "combobox", index: 1, quick: true }
    R_click_yt: { role: "option", name: "YouTube", quick: true }
    R_click_add_13: { role: "button", name: "Add", quick: true }

    # 14. Social - Linkedin
    R_click_add_field_14:
      { role: "button", name: "Add new field", exact: true, quick: true }
    sleep_14: 50
    R_click_social_6: { role: "combobox" }
    sleep_click_13: 50
    R_click_select_item_13: { role: "option", name: "Social" }
    R_click_social_combo_6: { role: "combobox", index: 1, quick: true }
