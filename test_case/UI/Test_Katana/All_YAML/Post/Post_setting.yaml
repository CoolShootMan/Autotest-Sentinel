# ==============================================================================
# Test Case: T2281
# T2281: Verify that duplicating a post copies Settings settings (allowExpire)
#        and the setting can be modified independently in the duplicate
#
# Step description:
# 1. Create a new post with title "test case 2281 post", enable "Allow expire" in Settings tab
# 2. Publish the post
# 3. Open the post and duplicate it via enhance-button menu
# 4. In the duplicate, change title to "test case 2281 post duplicate" and disable "Allow expire"
# 5. Publish the duplicate
# 6. Open the duplicate and navigate through tabs to verify the allowExpire setting is unchecked
#
# Expected result:
#   - Original post created successfully with allowExpire enabled
#   - Duplicate post created successfully with allowExpire disabled
#   - The duplicate's allowExpire setting is independent from the original
# ==============================================================================

testT2281:
    description: "Verify duplicate post copies Settings settings (allowExpire) and can be modified independently"
    test_step:
        # Step 1: Open post creation page
        open: "{BASE_URL}/post/create?c=POST_PAGE"
        sleep_after_open: 5000

        # Step 2: Click Content tab and fill title
        R_click_content_tab: { role: 'tab', name: 'Content' }
        sleep_step: 1000
        R_click_title_input: { role: 'textbox', name: 'Pick a bold title for your' }
        fill_title: { role: 'textbox', name: 'Pick a bold title for your', value: 'test case 2281 post' }
        sleep_step: 500

        # Step 3: Click Setting tab and enable allowExpire
        R_click_setting_tab: { role: 'tab', name: 'Settings' }
        sleep_step: 2000
        check_allow_expire: { locator: 'input[name="allowExpire"]' }
        sleep_step: 2000

        # Step 4: Click confirm button
        R_click_confirm: { test_id: 'confirm-button' }
        sleep_step: 2000

        # Step 5: Click Publish
        R_click_publish: { role: 'button', name: 'Publish' }
        sleep_step: 3000

        # Step 6: Click Save (success dialog)
        R_click_got_it: { role: 'button', name: 'Save' }
        sleep_step: 3000

        # Step 7: Click on the created post card to open it
        R_click_post_card: { locator: "text=test case 2281 post", index: 0 }
        sleep_step: 3000

        # Step 8: Click enhance-button (3rd) to open actions menu
        R_click_enhance_button: { locator: '[data-testid="enhance-button"]', index: 2 }
        sleep_step: 2000

        # Step 9: Click "Duplicate this post"
        R_click_duplicate: { role: 'button', name: 'Duplicate this post' }
        sleep_step: 3000

        # Step 10: In the duplicate, click Content tab and change title
        R_click_content_tab_2: { role: 'tab', name: 'Content' }
        sleep_step: 21000
        R_click_title_input_2: { role: 'textbox', name: 'Pick a bold title for your' }
        fill_title_duplicate: { role: 'textbox', name: 'Pick a bold title for your', value: 'test case 2281 post duplicate' }
        sleep_step: 500

        # Step 11: Click Seting tab and uncheck allowExpire
        R_click_setting_tab_2: { role: 'tab', name: 'Settings' }
        sleep_step: 2000
        uncheck_allow_expire: { locator: 'input[name="allowExpire"]', checked: false }
        sleep_step: 5000

        # Step 12: Click confirm button
        R_click_confirm_2: { test_id: 'confirm-button' }
        sleep_step: 1000

        # Step 13: Click Publish (publish the duplicate)
        R_click_publish_2: { role: 'button', name: 'Publish' }
        sleep_step: 3000

        # Step 14: Click Save (success dialog)
        R_click_got_it_2: { role: 'button', name: 'Save' }
        sleep_step: 3000

        # Step 15: Click on the duplicate post card (newest post, index: 0)
        R_click_duplicate_post_card: { locator: "text=test case 2281 post", index: 0 }
        sleep_step: 3000

        # Step 16: Navigate through tabs to verify settings
        R_click_selling_tab: { role: 'tab', name: 'Settings' }
        sleep_step: 1000

        sleep_end: 2000

    expect_result:
        description: "Duplicate post created with allowExpire setting independently modified (unchecked)"
        assertions:
            - assertion_type: "element_not_checked"
              locator: 'input[name="allowExpire"]'

