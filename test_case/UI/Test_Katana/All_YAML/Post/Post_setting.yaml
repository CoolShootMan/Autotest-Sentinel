# Separate verification for Guest
testT2830_VerifyGuest:
    guest: true
    description: "Verify that the post should be hidden from the store for guest users after curator action"
    test_step:
        open: "https://release.pear.us/autotestshop"
        sleep_after_open: 5000
        # Scroll to ensure all content is loaded and checked
        swipe_down_to_check: { x: 0, y: 800 }
        sleep_after_scroll: 2000
      
        # Step 1: scroll the Posts tab element into view
        wait_for_selector: { locator: "xpath=//button[@role='tab' and contains(text(),'Posts')]", scroll: true }
        sleep_after_wait_for_selector: 1000
        # Scroll down a bit more to better position the Posts tab
        swipe_down_to_check: { x: 0, y: 500 }
        sleep_after_scroll: 1000

        sleep_after_click: 2000
        screenshot_guest_view: { name: "debug_guest_view" }
        save_html_guest: { name: "debug_guest_source" }
    expect_result:
        description: "The post should be hidden from the store for guest users"
        assertions:
            - assertion_type: "element_not_visible_by_text"
              text: "Test event post variant settings"

    teardown_step:
        # Step 1: Inject partner cookies into guest context to switch identity
        add_cookies: {}
        sleep_step: 3000
        # Step 2: Open post URL as partner and uncheck hideInStore
        open_teardown: "https://release.pear.us/post/955bdb27-328e-40e4-b6ea-e93c269fb40a/view#tab=Content"
        sleep_step: 5000
        R_click_advanced_tab: { role: "tab", name: "Advanced" }
        sleep_step: 2000
        # Uncheck the hideInStore checkbox (checked: false to uncheck)
        uncheck_hide_in_store: { locator: "input[name='hideInStore']", checked: false }
        R_click_Save: { role: "button", name: "Save" }
        sleep_step: 3000
        # Step 3: Clear cookies to switch back to guest context
        clear_cookies: {}
        sleep_step: 1000
        # Step 4: Verify in guest context that the post is now visible
        open_guest_shop: "https://release.pear.us/autotestshop"
        sleep_step: 5000
        swipe_down_to_check: { x: 0, y: 800 }
        sleep_step: 2000
        wait_for_selector: { locator: "xpath=//button[@role='tab' and contains(text(),'Posts')]", scroll: true }
        sleep_step: 1000
        screenshot_guest_view_restored: { name: "debug_guest_view_restored" }
        save_html_guest_restored: { name: "debug_guest_source_restored" }
        verify_text_visible: { text: "Test event post variant settings" }