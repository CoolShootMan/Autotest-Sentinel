# ==============================================================================
# Test Case: T3779
# T3779: Set up auto-applied coupon on post "verify auto coupon apply"
#
# Precondition:
#   Curator is logged in; event "verify auto coupon apply" exists with post "verify auto coupon apply"
#
# Step description:
#   Navigate to post Promotion tab → Create a coupon → Enable auto-apply toggle →
#   Fill title/description "autotest3779" → Set value 100 → Click Create →
#   If info drawer appears click Got it → Save → Verify toast "Post promotions updated"
#
# Expected result:
#   Coupon created successfully with auto-apply enabled; toast "Post promotions updated" shown
# ==============================================================================

testT3779:
    description: "Create an auto-applied coupon on post verify auto coupon apply"
    test_step:
        # Step 1: Navigate to event "verify auto coupon apply"
        open: "{BASE_URL}/events"
        sleep_step: 5000

        R_click_my_event: { locator: "text=verify auto coupon apply", exact: true, index: 0 }
        sleep_step: 4000

        # Step 2: Scroll down to reveal post card
        scroll_to_bottom: { iterations: 5, delay: 500 }
        sleep_step: 2000

        # Step 3: Click into post "verify auto coupon apply" (index: 1 to skip event name)
        R_click_post_card: { locator: "text=verify auto coupon apply", exact: true, index: 1 }
        sleep_step: 4000

        # Step 3: Switch to Selling tab → Promotion tab
        R_click_selling_tab: { role: 'tab', name: 'Selling' }
        sleep_step: 1500

        R_click_promotion_tab: { role: 'tab', name: 'Promotion' }
        sleep_step: 1500


        # Step 3.5: Enable "Hide Coupon Box at Checkout"
        check_hide_coupon_box: { locator: 'input[name="hideCouponBox"]', skip_if_checked: true }
        sleep_step: 500
        # Step 4: Click "Create a coupon" button
        R_click_create_coupon_btn: { role: 'button', name: 'Create a coupon' }
        sleep_step: 1500

        # Step 5: Enable "Automatically applied at checkout" toggle
        check_auto_apply: { locator: 'input[name="autoApplied"]', skip_if_checked: true }
        sleep_step: 500

        # Step 6: Fill in Coupon display title
        fill_coupon_title: { locator: 'input[placeholder="Coupon display title"]', value: 'autotest3779' }
        sleep_step: 300

        # Step 7: Fill in Coupon display description
        fill_coupon_desc: { locator: 'input[placeholder="Coupon display description"]', value: 'autotest3779' }
        sleep_step: 300

        # Step 8: Fill in Customer benefits value (100)
        fill_coupon_value: { locator: 'input[name="betterDeals.0.value"]', value: '100' }
        sleep_step: 300

        # Step 9: Click "Create" to submit
        R_click_create: { role: 'button', name: 'Create' }
        sleep_step: 2000

        # Step 10: If "Hide Coupon Box at Checkout" enabled info drawer appears, click "Save"
        smart_click_optional_got_it: { role: 'button', name: 'Save', timeout: 3000 }
        sleep_step: 1000

        # Step 11: Save and verify toast
        R_click_save: { role: 'button', name: 'Save' }
        wait_toast_saved: { message: "Post promotions updated", timeout: 15000 }

    expect_result:
        description: "Auto-applied coupon 'autotest3779' created successfully; Post promotions updated toast shown"
        assertions:
            - assertion_type: "toast_visible"
              text: "Post promotions updated"


