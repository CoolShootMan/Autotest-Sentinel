# Test Case: T1742 Verify that the Post commission rate can be Batch setting to a Fix value
# Step description:
# 1. MC puts two Items when creating a Post, one is a self_listing product and the other is a resale product. 
# 2. Click and open "Share this post with promoters?" under Post setting. 
# 3. Click "Bulk set", Set the commission rate to 50% in "Bulk set a promoter commission" 
# 4. Click "Apply to all" 
# 5. Click "Publish" and ”Confirm“ 
# 6. Use one account to purchase two products in Post and check the commission
# Expected result:
# Successfully published a post with batch setting of commission rate, and the combined commission is calculated correctly.
# (self_listing products with "your", total commission rate is 0%)

# T1742: Post commission Batch set to 10%
testT1742:
    description: "Post commission Batch set to 10%"
    test_step:
        # Step 1: Events 列表页 -> 点击 Event 卡片
        open: "https://release.pear.us/events"
        sleep_step: 5000

        # "Auto-Test-post-setting" 是 DIV 元素（非 BUTTON），用 text 精确匹配
        R_click_my_event: { locator: "text=Auto-Test-post-setting", exact: true, index: 0 }
        sleep_step: 4000

        # Step 2: Event 详情页 -> 点击 Post 卡片
        R_click_post: { role: 'button', name: 'Get Tickets', index: 0 }
        sleep_step: 3000

        # Step 3: Post 详情页 -> Selling tab -> Customize products -> Batch set commission rates
        R_click_selling: { role: 'tab', name: 'Selling' }
        sleep_step: 2000
        R_click_customize: { role: 'button', name: 'Customize products' }
        sleep_step: 3000
        R_click_batch_set: { role: 'button', name: 'Batch set commission rates' }
        sleep_step: 1500

        # Step 4: 填佣金 10 -> Confirm -> Save
        fill_commission: { placeholder: "e.g., 5", value: '10' }
        sleep_step: 3000
        R_click_confirm_value: { role: 'button', name: 'Confirm' }
        sleep_step: 1500

        # Save（若已是10%则Save为disabled，跳过）
        R_click_save_1: { role: 'button', name: 'Save', skip_if_disabled: true, disable_ai: true }
        # 优化：等待 Save 按钮变为 disabled，表示保存完成
        R_click_save_2: { role: 'button', name: 'Save', skip_if_disabled: true, disable_ai: true }
        # 优化：等 toast 出现说明后端真正保存成功
        wait_toast_success: { message: "Post products updated", timeout: 15000 }

        R_click_close_drawer: { locator: '[data-testid="CloseIcon"]', optional: true, disable_ai: true }
        sleep_step: 2000

        # Step 5: 验证 Post Card 显示 "Offer up to 10%"
        verify_post_offer: { text: "Offer up to 10%" }

        # Step 6: 重新打开 Events 验证
        open_again: "https://release.pear.us/events"
        sleep_end: 3000

    expect_result:
        assertions:
          - assertion_type: "element_visible_by_text"
            text: "10"

    teardown_step:
        # 恢复设置：重新进入 event -> post -> Selling -> Customize，将佣金改回 8%
        R_click_product: { locator: "text=Auto-Test-post-setting", exact: true, index: 0 }
        sleep_step: 4000
        R_click_post_teardown: { role: 'button', name: 'Get Tickets', index: 0 }
        sleep_step: 3000
        R_click_selling_teardown: { role: 'tab', name: 'Selling' }
        sleep_step: 2000
        R_click_customize_teardown: { role: 'button', name: 'Customize products' }
        sleep_step: 3000
        R_click_batch_set_teardown: { role: 'button', name: 'Batch set commission rates' }
        sleep_step: 1500
        # 恢复佣金为 8（与测试值 10 不同，确保 Save 可点击）
        fill_commission_teardown: { placeholder: "e.g., 5", value: '8' }
        sleep_step: 1000
        R_click_confirm_teardown: { role: 'button', name: 'Confirm' }
        sleep_step: 1500

        # teardown Save（佣金从10→8有变化，Save一定可点；但保险起见也加 skip_if_disabled）
        R_click_save_teardown_1: { role: 'button', name: 'Save', skip_if_disabled: true, disable_ai: true }
        # 优化：等待 Save 按钮变为 disabled，表示保存完成
        R_click_save_teardown_2: { role: 'button', name: 'Save', skip_if_disabled: true, disable_ai: true }
        sleep_step: 2000
        # 优化：等 toast 出现说明后端真正保存成功
        wait_toast_success_teardown: { message: "Post products updated", timeout: 15000 }

        R_click_close_drawer_teardown: { locator: '[data-testid="CloseIcon"]', optional: true, disable_ai: true }
        sleep_end: 1000
        # Step 5: 验证 Post Card 显示 "Offer up to 8%"
        verify_post_offer: { text: "Offer up to 8%" }







testT3991:
    description: "Verify that partner can set a note for co-sellers in a post"
    test_step:
        open: "https://release.pear.us/post/create"
        sleep_after_open: 5000
        
        click_content_tab: { role: 'tab', name: 'Content' }
        fill_post_title: { role: 'textbox', name: 'Pick a bold title for your', value: 'testT3991' }
        
        click_advanced_tab: { role: 'tab', name: 'Advanced' }
        
        # 必定断言 1：验证高级设置可见
        verify_allow_copy_visible: { text: "Allow others to copy" }
        
        click_commerce_tab: { role: 'tab', name: 'Commerce' }
        click_add_product_cta: { test_id: 'enhance-button-cta' }
        click_product_img: { role: 'img', name: 'Image of Product', index: 0 }
        sleep_after_click_product: 1000
        click_add_product_btn: { role: 'button', name: 'Add 1/20 product(s)' }
        sleep_after_add_product: 1500
        
        # 弹窗状态变化后，勾选产品选项（此时在弹窗内或已切换回主页面）
        check_product_checkbox: { role: 'checkbox', index: 0, no_modal_scope: true }
        sleep_after_check_product_checkbox: 1000
        click_save_btn_commerce: { role: 'button', name: 'Save' }
        sleep_before_confirm: 1000
        click_confirm_publish: { test_id: 'confirm-button' }
        click_publish_btn: { role: 'button', name: 'Publish' }
        sleep_after_publish: 3000
        click_got_it_btn: { role: 'button', name: 'Got it' }
        sleep_after_got_it: 2000
        
        # 点击刚创建的Post进入详情
        click_post_card: { role: 'button', name: 'Image of Product testT3991 $', index: 0 }
        sleep_after_click_post: 3000
        
        click_coselling_tab: { role: 'tab', name: 'Co-selling' }
        click_cosellers_tab: { role: 'tab', name: 'Co-sellers' }
        click_mui_btn: { test_id: 'mui-button' }
        check_coseller_checkbox: { role: 'checkbox', index: 1 }
        click_add_btn: { role: 'button', name: 'Add' }
        
        # 必定断言 2：添加co-seller成功后的提示
        verify_toast_post_added: { text: "Post added!" }
        sleep_after_toast_1: 1500
        
        click_advanced_tab_2: { role: 'tab', name: 'Advanced' }
        
        # 必定断言 3：验证设置项可见
        verify_note_visible: { text: "Add a note for co-sellers" }
        
        check_enable_downline_note: { locator: 'input[name="enableDownlineNote"]' }
        fill_note: { role: 'textbox', name: 'Enter a short message for', value: 'test_3991' }
        click_apply_btn: { role: 'button', name: 'Apply' }
        click_save_btn: { role: 'button', name: 'Save' }
        sleep_after_save: 3000

        # 必定断言 4：配置完成后的提示
        verify_toast_settings_updated: { text: "Post advanced settings updated" }
        
    expect_result:
        description: "Partner should be able to set a note for co-sellers successfully."
        assertions: []







# ==============================================================================
# Test Case: T3683 & T3684
# T3683: Verify the user can edit order confirmation note for original post
# T3684: Verify the order confirmation note is displayed on order placed page
#
# Step description:
# 1. Open Events -> click Auto-Test-post-setting -> click Get Tickets -> enter Post edit page
# 2. T3683: Switch to Advanced tab, enable "Order confirmation note" toggle, input note, save
# 3. T3684: Add to cart, checkout, place order
#           Verify confirmation note displayed on order placed page and order details page
#
# Expected result:
# 1. T3683: On Advanced tab, "Order confirmation note" toggle default is OFF
#           After enabling: input box shows placeholder "e.g., Event time, location, or special instructions for buyers"
#           Max length 2000, saved successfully with toast
# 2. T3684: Confirmation note displayed below order details on order placed page
#           Confirmation note displayed below order instruction on order details page
# ==============================================================================


testT3683_T3684:
    description: "Verify Order Confirmation Note - Edit in Advanced Tab and Verify Display on Order Page"
    test_step:
        # Step 1: Events 列表页 -> 点击 Event 卡片
        open: "https://release.pear.us/events"
        sleep_step: 5000

        # "Auto-Test-post-setting" 是 DIV 元素（非 BUTTON），用 text 精确匹配
        R_click_my_event: { locator: "text=Auto-Test-post-setting", exact: true, index: 0 }
        sleep_step: 4000

        # Step 2: Event 详情页 -> 点击 Post 卡片
        R_click_post: { role: 'button', name: 'Get Tickets', index: 0 }
        sleep_step: 3000

        # Step 3: Post edit 页面 -> 切到 Advanced tab
        R_click_advanced_tab: { role: 'tab', name: 'Advanced' }
        sleep_step: 1500

        # T3683 Step 1: 等待 Advanced tab 加载完成
        wait_advanced_loaded: { role: 'tab', name: 'Advanced', timeout: 8000 }
        sleep_step: 1000

        # T3683 Step 2: 点击 toggle 开启 Order confirmation note（仅当 OFF -> ON 时才点击）
        R_click_order_note_toggle: { locator: 'input[name="isOrderConfirmationNoteEnabled"]', skip_if_checked: true }
        sleep_step: 1000

        # T3683 Step 3: 验证 toggle 已开启（输入框出现）
        # 注意：用 smart_wait 验证 label 存在（而非 verify_text_visible）
        wait_order_note_label: { text: "Order confirmation note", timeout: 8000 }
        fill_order_note: { placeholder: "e.g., Event time, location, or special instructions for buyers", value: 'Test Note - Concert at 7PM, Venue: Test Arena, Please bring ID' }
        sleep_step: 500

        # T3683 Step 4: 保存
        R_click_save: { role: 'button', name: 'Save' }
        wait_toast_save: { message: "Post advanced settings updated", timeout: 15000 }

        # Step 5: 关闭 Post edit drawer，回到 Event 详情页
        R_click_close_drawer: { locator: '[data-testid="CloseIcon"]', optional: true, disable_ai: true }
        sleep_step: 2000

        # =========================================================================
        # T3684: Guest 下单验证 confirmation note 显示
        # =========================================================================

        # Step 5.1: 退出 Curator 账号
        open_account: "https://release.pear.us/account"
        sleep_step: 3000

        R_click_logout: { role: 'button', name: 'Log out' }
        sleep_step: 3000

        # Step 6: 直接访问 Post 页面进行 Guest 购票
        open_post: "https://release.pear.us/autotestshop/post/auto-test-post-setting-t1742"
        sleep_step: 3000

        # Step 7: 选择产品 "General Admission 01"，点击其 Buy Ticket 按钮
        R_click_buy_ticket_ga01: { near_text: "General Admission 01", role: 'button', name: 'Buy Ticket', index: 0 }
        sleep_step: 2000

        # Step 8: 输入 coupon code "autotest" 实现 0 元购
        fill_coupon_code: { placeholder: 'Enter coupon code', value: 'autotest' }
        sleep_step: 500

        R_click_apply: { role: 'button', name: 'Apply' }
        sleep_step: 2000

        # Step 8.1: 点击 Continue 进入 Contact 信息填写页面
        R_click_continue: { role: 'button', name: 'Continue' }
        sleep_step: 2000

        # Step 9: 填写 Contact 信息
        fill_first_name: { locator: 'input[name="contact.firstName"]', value: 'Test' }
        sleep_step: 500

        fill_last_name: { locator: 'input[name="contact.lastName"]', value: 'User' }
        sleep_step: 500

        fill_phone: { locator: 'input[name="contact.phoneNumber"]', value: '+1 6502396646' }
        sleep_step: 500

        fill_email: { locator: 'input[name="contact.email"]', value: 'linda.zhou.ext+10@1m.app' }
        sleep_step: 500

        # Step 10: Place Order
        R_click_place_order: { role: 'button', name: 'Place order' }
        sleep_step: 3000

        # T3684 Expected: 验证 confirmation note 显示（无需手动滚动，wait_for 会自动等待可见）
        verify_note_on_order_placed: { text: 'Test Note - Concert at 7PM, Venue: Test Arena, Please bring ID' }
        sleep_end: 3000

    expect_result:
        assertions:
            # ===== T3684: Order Confirmation - Additional Details =====
            # 这些断言在所有测试步骤执行完后运行，此时在 Order Placed 页面
            - assertion_type: "element_visible_by_text"
              text: "Test Note - Concert at 7PM, Venue: Test Arena, Please bring ID"












