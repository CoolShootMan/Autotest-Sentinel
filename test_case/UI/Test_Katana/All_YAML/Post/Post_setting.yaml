# T2705: Partner hides the variant and sets the default variant
testT2705_VerifyPartner:
  guest: false
  description: "Partner hides the variant and sets the default variant on the management page"
  test_step:
    # Step 1: Open Events list page
    open: "{BASE_URL}/events"
    sleep_after_open: 5000

    # Step 2: Find and click "Test event post variant settings" event
    R_click_event: { locator: "text=Test event post variant settings", exact: true }
    sleep_step: 4000

    # Step 2.1: Scroll down to reveal post card
    swipe_avoid_plus: { x: 0, y: 500 }
    sleep_step: 1000

    # Step 3: Click post card to enter post landing page
    R_click_post_card: { role: "button", name: "test-event-post-variant-settings", index: 0 }
    sleep_step: 3000

    # Step 3.1: Click "Edit post" button
    R_click_edit_post: { role: "button", name: "Edit style" }
    sleep_step: 3000

    # Step 3.2: Click "Style" tab in Edit post dialog
    # R_click_style_tab: { role: "tab", name: "Style" }
    # sleep_step: 2000

    # Step 3.3: Click Layout dropdown and select "Collection"
    R_click_layout_dropdown: { locator: "[role='combobox']" }
    sleep_step: 1000
    R_click_collection_option: { locator: "text=Collection" }
    sleep_step: 1000

    # Step 3.4: Click "Update" to save Edit post changes
    R_click_update: { role: "button", name: "Update" }
    sleep_step: 2000

    # Step 3.5: Click "Update" in confirmation popup "Update This Post?"
    R_click_update_confirm: { role: "button", name: "Update" }
    sleep_step: 3000

    # Step 4: Click Selling tab
    R_click_selling_tab: { role: "tab", name: "Selling" }
    sleep_step: 2000

    # Step 5: Click Customize products
    R_click_customize: { role: "button", name: "Customize products" }
    sleep_before_scroll: 2000

    # Scroll down the drawer to reveal the variants table
    swipe_avoid_plus: { x: 0, y: 500 }
    sleep_step: 1000

    # The exclude checkbox for '5 people' (1st column checkbox, index=0)
    check_exclude: { locator: "xpath=//tr[descendant::*[contains(text(), '5 people')]]//input[@type='checkbox']", index: 0 }

    # The default variant checkbox for '9 people' (2nd column checkbox, index=1)
    check_default: { locator: "xpath=//tr[descendant::*[contains(text(), '9 people')]]//input[@type='checkbox']", index: 1 }

    # Save and Save1
