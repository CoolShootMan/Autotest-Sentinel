      - assertion_type: "element_visible_by_text"
        text: "buy venue | Mon, Jul 20 (CDT)"
      - assertion_type: "element_visible_by_text"
        text: "AboutT5390"
      - assertion_type: "element_visible_by_text"
        text: "Remove Event description section?"

