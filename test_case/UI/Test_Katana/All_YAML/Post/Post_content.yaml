        # Step 4: Switch to Posts tab
        R_click_posts_tab: { role: "tab", name: "Posts" }
        sleep_step: 2000

        # Step 5: Click post card
        R_click_post_card: { role: "button", name: "test-event-post-variant-settings", index: 0 }
        sleep_step: 3000

        # Step 6: Click Edit content to enter RTE editor
        R_click_edit_content: { role: "button", name: "Edit content" }
        sleep_step: 3000

        # Step 7: Click on merch 002 button to select the banner & reveal trash icon
        R_click_merch_002: { role: "button", name: "avatar My item merch 002 $200" }
        sleep_step: 1000

        # Step 8: Click Delete button to delete the banner
        R_click_delete: { role: "button", name: "Delete" }
        sleep_step: 1000

        # Step 9: Verify merch 001 is no longer visible in RTE
        verify_merch_001_hidden:
            text: "merch 001"
