    R_click_clear_date: { locator: '[data-testid="close-circle-fill"] path', index: 1 }
    sleep_after_clear: 500

    # Open calendar picker (click calendar icon)
    # NOTE: fragile selector from recording — path:nth-child(2) is the calendar SVG path
