    fill_venue: { role: "textbox", name: "Venue", value: "buy venue" }
    sleep_after_venue: 1000

    # Fill description
    fill_description: { role: "textbox", name: "Description (optional)", value: "T5390" }
    sleep_after_description: 1000

    # Save event
    R_click_save: { role: "button", name: "Save" }
    sleep_after_save: 3000

    # Step 3: Go to Posts tab and open post
    R_click_posts_tab: { role: "tab", name: "Posts" }
    sleep_after_posts: 2000

    # Click post card
    R_click_post_card: { locator: '[data-testid="mui-card-action-area"]', index: 0 }
    sleep_after_post: 3000

    # === ASSERTION: Post title synced with event title "T5390" ===
    verify_post_title_synced: { text: "T5390" }

    # === ASSERTION: Post card subtitle synced with venue + date ===
    verify_subtitle_synced: { text: "buy venue | Mon, Jul 20 (CDT)" }

    # Step 4: Edit post content to verify RTE sync
    R_click_edit_content: { role: "button", name: "Edit content" }
    sleep_after_edit_content: 2000

    # === ASSERTION: Edit content page loaded (Post title field visible) ===
    verify_edit_loaded: { text: "Post title" }

