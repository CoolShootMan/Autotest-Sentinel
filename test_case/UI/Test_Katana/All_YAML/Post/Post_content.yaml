# T5390: Verify Post-Event auto sync (event info -> post title, post card, RTE)
# Pre-condition: Pre-created empty event "verify-post-shipping_fee" with published post
# Test focus: When event info (title/date/venue/description) is updated,
#             Post title, post card subtitle, and RTE components should auto-sync
# Note: "User customization does not sync" logic will be added in a separate case
# ==============================================================================
testT5390:
  description: "Verify event info updates auto-sync to post title, post card, and RTE components"
  test_step:
    # Step 1: Open events page and click event
    open: "{BASE_URL}/events"
