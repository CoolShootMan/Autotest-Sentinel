    verify_rte_event_info: { text: "buy venue" }

    # === ASSERTION: RTE has description component (description synced to RTE) ===
    # "About" is the label, "T5390" is the content — rendered as "AboutT5390" in DOM
    verify_rte_description: { text: "AboutT5390" }

    # Step 5: Delete description component -> verify dialog -> Keep section (branch A)
    R_click_delete_desc: { role: "button", name: "Delete" }
    sleep_after_delete: 1000

    # === ASSERTION: Remove dialog appears with correct text ===
    verify_dialog_text: { text: "Remove Event description section?" }

