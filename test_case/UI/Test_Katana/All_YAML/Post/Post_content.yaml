# ==============================================================================
# T5442: Verify newly added ticket/merch default hidden status and top position
#        in All tickets/merch banner
#
# Test Flow:
#   1. Pre-condition  → Verify existing 3 tickets are Show status (no Hidden label)
#   2. testT5442      → Add ticket/merch in Event, verify hidden + top in post
#   3. VerifyGuest    → Guest sees only original 3 tickets, new items not visible
#   4. Teardown       → Delete newly added ticket and merch
# ==============================================================================

# ------------------------------------------------------------------------------
# Test Case 1: Add ticket/merch & verify
# ------------------------------------------------------------------------------
testT5442:
    description: "Verify newly added ticket/merch in Event default hidden status and top position in All tickets/merch banner"

    # Pre-condition =============================================================
    pre_condition:
        description: "Ensure existing tickets in All tickets/merch banner are Show status"
        expect_result: "All existing tickets are in Show status (no Hidden label)"
        test_step:
            # Navigate to Event "Auto-Test-post-setting"
            open:                           "{BASE_URL}/events"
            sleep_step:                     5000
            R_click_my_event:               { locator: "text=Auto-Test-post-setting", exact: true, index: 0 }
            sleep_step:                     4000

            # Open post "auto-test-post-setting-t1742"
            R_click_posts_tab:              { role: "tab", name: "Posts" }
            sleep_step:                     2000
            R_click_post:                   { locator: "text=auto-test-post-setting-t1742", exact: true, index: 0 }
            sleep_step:                     3000

            # Edit content → verify no Hidden label on existing tickets
            R_click_edit_content:           { role: "button", name: "Edit content" }
            sleep_step:                     3000
            verify_no_hide_button:
                text: "Hide"
                assert_not_visible: true

    # Test Steps ================================================================
    test_step:
        # Re-navigate to event (avoid close-button issue)
        open:                      "{BASE_URL}/events"
        sleep_step:                5000
        R_click_my_event:          { locator: "text=Auto-Test-post-setting", exact: true, index: 0 }
        sleep_step:                4000

        # ----------------------------------------------------------------------
        # Step 1: Add a new ticket via Tickets tab
        # ----------------------------------------------------------------------
        R_click_tickets_tab:       { role: "tab", name: "Tickets & Merch" }
        sleep_step:                2000

        R_click_add_ticket:     { role: "button", name: "Add ticket" }
        sleep_step:             2000
        fill_ticket_title:      { role: "textbox", name: "Product title", value: "new ticket related to T5442" }
        sleep_step:             1000
        fill_ticket_price:      { locator: 'input[name="variants.0.price"]', value: "10" }
        sleep_step:             1000
        fill_ticket_quantity:   { placeholder: "Quantity", value: "20" }
        sleep_step:             1000

        R_click_add_media:      { role: "button", name: "Add Media" }
        sleep_step:             2000
        R_click_media_img:     { role: "img", index: 0 }
        sleep_step:             2000
        R_click_done_media:     { role: "button", name: "Done" }
        sleep_step:             2000

        R_click_create_ticket:  { role: "button", name: "Create" }
        sleep_step:             3000
        R_click_save_visibility_ticket: { role: "button", name: "Save" }
        sleep_step:             3000

        # ----------------------------------------------------------------------
        # Step 2: Add a new merch (same Tickets & Merch tab)
        # ----------------------------------------------------------------------
        R_click_merch_subtab:   { locator: "text=Merch", exact: true }
        sleep_step:             2000
        R_click_add_merch:      { role: "button", name: "Add merch" }
        sleep_step:             2000
        fill_merch_title:       { role: "textbox", name: "Product title", value: "new merch related to T5442" }
        sleep_step:             1000
        fill_merch_price:      { locator: 'input[name="variants.0.price"]', value: "10" }
        sleep_step:             1000
        fill_merch_quantity:    { placeholder: "Quantity", value: "20" }
        sleep_step:             1000

        R_click_add_media_merch: { role: "button", name: "Add Media" }
        sleep_step:             2000
        R_click_media_img_merch: { role: "img", index: 0 }
        sleep_step:             2000
        R_click_done_media_merch: { role: "button", name: "Done" }
        sleep_step:             2000

        R_click_create_merch:   { role: "button", name: "Create" }
        sleep_step:             2000
        R_click_save_visibility_merch: { role: "button", name: "Save" }
        sleep_step:             3000

        # ----------------------------------------------------------------------
        # Step 3: Go to post → edit content → verify in All tickets/merch banner
        # ----------------------------------------------------------------------
        R_click_posts_tab:      { role: "tab", name: "Posts" }
        sleep_step:             2000
        R_click_post:           { locator: "text=auto-test-post-setting-t1742", exact: true, index: 0 }
        sleep_step:             3000
        R_click_edit_content:   { role: "button", name: "Edit content" }
        sleep_step:             3000

        verify_merch_hidden:
            assertion_type: "element_visible_by_text"
            text: "Hidden"
            scope: "first merch in All tickets/merch banner"

        verify_ticket_hidden:
            assertion_type: "element_visible_by_text"
            text: "Hidden"
            scope: "first ticket in All tickets/merch banner"

        sleep_end:              3000

    # Expected Result ===========================================================
    expect_result:
        description: "Newly added ticket/merch in Event appears in post All tickets/merch banner, default status Hidden, placed at top"

# ------------------------------------------------------------------------------
# Test Case 2: Guest verification — new ticket/merch must NOT be visible
# ------------------------------------------------------------------------------
VerifyGuest_testT5442:
    guest: true
    description: "Verify guest only sees original 3 tickets; new ticket/merch not visible"
    test_step:
        open:                               "{BASE_URL}/autotestshop/post/auto-test-post-setting-t1742"
        sleep_after_open:                   5000

        verify_page_loaded:
            text:                     "auto-test-post-setting"

        verify_new_ticket_not_visible:
            text:                     "new ticket related to T5442"
            assert_not_visible:       true

        verify_new_merch_not_visible:
            text:                     "new merch related to T5442"
            assert_not_visible:       true

    expect_result:
        description: "Guest sees only original 3 tickets; new ticket and merch are not visible"

# ------------------------------------------------------------------------------
# Test Case 3: Teardown — delete newly added ticket and merch
# ------------------------------------------------------------------------------
testTeardown_T5442:
    description: "Delete newly added ticket and merch to restore original state"
    test_step:
        open: "{BASE_URL}/events"
        sleep_step: 5000

        R_click_my_event: { locator: "text=Auto-Test-post-setting", exact: true, index: 0 }
        sleep_step: 4000
        R_click_TM_tab: { role: 'tab', name: 'Tickets & Merch' }
        sleep_step: 2000

        # ---- Delete new merch (only if exists) ----
        # verify_merch_exists: { text: "new merch related to T5442" }
        R_click_merch_more:  { locator: '[data-testid="mui-stack"]:has(:text("new merch related to T5442")) >> [data-testid="MoreHorizIcon"]' }
        sleep_step: 1000
        R_click_delete_merch: { locator: "text=Delete merch" }
        sleep_step: 1000
        R_click_confirm_merch: { role: 'button', name: 'Delete' }
        sleep_step: 3000

        # verify_ticket_exists: { text: "new ticket related to T5442"}
        R_click_ticket_more: { locator: '[data-testid="mui-stack"]:has(:text("new ticket related to T5442")) >> [data-testid="MoreHorizIcon"]' }
        sleep_step: 1000
        R_click_delete_ticket: { locator: "text=Delete ticket"}
        sleep_step: 1000
        R_click_confirm_ticket: { role: 'button', name: 'Delete' }
        sleep_step: 3000

    expect_result:
        description: "Newly added ticket and merch deleted successfully"


# ==============================================================================
# Test Case: T5332 Verify allow partners to insert all merch in RTE
# Flow: Insert -> hover Event -> Insert all merch -> click Update
# ==============================================================================

testT5332:
    description: "Verify partners can insert all merch in RTE"
    pre_condition:
        description: "navigate to test post and enter RTE editor"
        expect_result: "RTE editor is opened"
        test_step:
            # Step 1: Navigate to events list
            open: "{BASE_URL}/events"
            sleep_step: 5000

            # Step 2: Find and click target event card
            R_click_event: { locator: "text=Test event post variant settings", exact: true }
            sleep_step: 4000

            # Step 3: Click Posts tab
            R_click_posts_tab: { role: "tab", name: "Posts" }
            sleep_step: 2000

            # Step 4: Click post card to enter post landing page
            R_click_post_card: { role: "button", name: "test-event-post-variant-settings", index: 0 }
            sleep_step: 3000

            # Step 5: Click edit button to enter RTE
            R_click_edit_button: { role: "button", name: "Edit content" }
            sleep_step: 3000

    test_step:

        # Step 6: Click the Insert button in RTE toolbar
        R_click_insert_button: { role: "button", name: "Insert" }
        sleep_step: 2000

        # Step 7: Hover over "Event" menu item to reveal submenu (Insert all merch)
        # Event is hover-triggered — use JS dispatch mouseenter on role="menuitem"
        execute_js:
            script: |
                () => {
                    const items = document.querySelectorAll('[role="menuitem"]');
                    for (const el of items) {
                        if (el.textContent.trim() === 'Event' && el.offsetParent !== null) {
                            el.dispatchEvent(new MouseEvent('mouseenter', {bubbles: true}));
                            el.dispatchEvent(new MouseEvent('mouseover', {bubbles: true}));
                            return 'hovered_event_menuitem';
                        }
                    }
                    const all = [...document.querySelectorAll('*')].filter(e =>
                        e.textContent.trim() === 'Event' &&
                        e.children.length === 0 &&
                        e.offsetParent !== null &&
                        !e.closest('[class*="cta"]') &&
                        !e.closest('[class*="CTA"]')
                    );
                    if (all.length > 0) {
                        all[0].dispatchEvent(new MouseEvent('mouseenter', {bubbles:true}));
                        all[0].dispatchEvent(new MouseEvent('mouseover', {bubbles:true}));
                        return 'hovered_fallback';
                    }
                    return 'not_found';
                }
            assert_contains: "hovered"
        sleep_step: 2000

        # Step 8: Click "Insert all merch" from the revealed submenu
        R_click_insert_all_merch: { name: "Insert all merch", fallback_scan: true }
        sleep_step: 3000

        # Step 9: Click "Update" button at bottom of Edit post content dialog to save inserted merch
        R_click_update_post: { role: "button", name: "Update" }
        sleep_step: 2000

        # Step 10: Click "Update" button in the "Update This Post?" confirmation dialog
        R_click_confirm_update: { role: "button", name: "Update" }
        sleep_step: 2000

        # Step 11: Verify "Post published!" toast appears after publishing
        verify_toast_post_published: { text: "Post published!" }
        sleep_step: 2000

    expect_result:
        description: "All merch from event can be inserted in RTE, saved via Update, and Post published! toast appears"
        assertions:
            - assertion_type: "element_visible_by_text"
              text: "merch 001"
            - assertion_type: "element_visible_by_text"
              text: "merch 002"


# ==============================================================================
# Test Case: T5332_VerifyGuest
# Verify that merch 001 and merch 002 are displayed on post detail page (guest view)
# Run AFTER testT5332 completes (merch must be inserted first)
# ==============================================================================

testT5332_VerifyGuest:
    guest: true
    description: "Verify that merch 001 and merch 002 are displayed on post detail page for guest users after partner inserts all merch in RTE"
    test_step:
        # Step 1: Open the post detail page as guest
        open: "{BASE_URL}/autotestshop/post/test-event-post-variant-settings"
        sleep_after_open: 5000

        # Step 2: Scroll down to reveal the merch section
        # scroll_to_bottom uses page.mouse.wheel (real desktop scroll) - more reliable than swipe gesture
        # Tries to scroll directly to "merch 001"; if lazy-loaded, falls back to iterative wheel scroll
        scroll_to_bottom: { text: "merch 001", iterations: 15, delay: 500 }

    expect_result:
        description: "Both merch 001 and merch 002 should be visible on the post detail page in guest view"
        assertions:
            - assertion_type: "element_visible_by_text"
              text: "merch 001"
            - assertion_type: "element_visible_by_text"
              text: "merch 002"
