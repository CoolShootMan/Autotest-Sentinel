testT4984_partner:
  description: "Verify adding products to a post via the enhance button in Selling tab"
  test_step:
    open: "{BASE_URL}/events"
    sleep_after_open: 5000

    click_view_event: { role: 'cell', name: "verify-post-shipping_fee" }
    sleep_after_view_event: 2000

    # Click Posts tab before creating a post
    R_click_posts_tab: { role: "tab", name: "Posts" }
    sleep_after_posts_tab: 1000

    # Create a post
    click_create_post: { role: "button", name: "Create another post" }
    sleep_after_create_post: 2000
    click_confirm: { role: "button", name: "Confirm" }
    sleep_after_confirm: 3000
    click_product_button:
      locator: '[data-testid="mui-card-action-area"]'
      index: 0
      exact: true
    sleep_after_product_button: 2000
    # Add products to the post
    click_selling_tab: { role: "tab", name: "Selling", exact: true }
    sleep_after_selling_tab: 1500
    click_enhance_button: { locator: '[data-testid="enhance-button-cta"]' }
    sleep_after_enhance: 2000
    click_product_img_1: { role: "img", name: "Image of Product", index: 3 }
    sleep_after_img: 1500
    click_add_products: { role: "button", name: "Add" }
    sleep_after_add: 2000

    if_start_commission:
      condition:
        role: "button"
        name: "Start Customizing"
      then:
        sleep_after_start_commission: 1500
        click_start_commission: { role: "button", name: "Start Customizing" }
        sleep_after_start_commission: 1500
        click_start_commission_done_1: { role: "button", name: "Done" }
        sleep_after_start_commission: 1500
        click_start_commission_done_2: { role: "button", name: "Done" }
        sleep_after_start_commission: 1500

    click_save_1: { role: "button", name: "Save" }
    sleep_after_save_1: 2000
    click_save_2: { role: "button", name: "Save" }
    sleep_after_save_2: 3000

    # Edit the post content (UI changed: Edit post split into Edit content / Edit style)
    click_content_tab: { role: "tab", name: "Content" }
    sleep_after_content_tab: 1500
    click_edit_content: { role: "button", name: "Edit content" }
    sleep_after_edit_content: 2000
    if_discard_drawer:
      condition:
        role: "button"
        name: "Discard"
      then:
        click_discard: { role: "button", name: "Discard" }
        sleep_after_discard: 1500
    check_show_additional_content:
      { locator: 'input[name="showAdditionalContent"]' }
    sleep_after_check_content: 1500
    click_insert_1: { role: "button", name: "Insert", exact: true, index: 1 }
    sleep_after_insert_1: 1500
    R_click_cta_elements:
      locator: "li"
      text: "CTA Elements"
    sleep_after_hover_cta: 1500
    R_click_cta_product_banner: { role: "menuitem", name: "CTA Product Banner" }
    sleep_after_cta_banner: 1500
    click_product_img_2: { role: "img", name: "Image of Product", index: 1 }
    sleep_after_img_2: 1500
    click_insert_2: { role: "button", name: "Insert" }
    sleep_after_insert_2: 2000
    click_mui_button: { locator: '[data-testid="mui-button"]' }
    sleep_after_mui_button: 1500
    click_confirm_button: { locator: '[data-testid="confirm-button"]' }
    sleep_after_confirm_button: 1500
    click_update: { role: "button", name: "Update" }
    sleep_after_update: 3000

  expect_result:
    description: "Products should be added and saved successfully"
    assertions: []


testT4984_guest:
  description: "Verify guest user can buy a product from event post"
  guest: true
  test_step:
    open: "{BASE_URL}/autotestshop/post/auto-test-post-setting-t1742"
    sleep_after_open: 3000

    click_buy_now:
      locator: '[data-testid="pear-event-banner-container"] [data-testid="post-product-buy-now"]'
    sleep_after_buy_now: 1500

    click_continue_cta: { locator: '[data-testid="checkout-in-post-credit-card-cta"]' }
    sleep_after_continue: 1500

    fill_first_name: { locator: 'input[name="contact.firstName"]', value: "Test" }
    sleep_after_first_name: 1000

    fill_last_name: { locator: 'input[name="contact.lastName"]', value: "Tang" }
    sleep_after_last_name: 1000

    fill_email: { locator: 'input[name="contact.email"]', value: "tiancheng.ext@1m.app" }
    sleep_after_email: 1000

    fill_phone: { role: "textbox", name: "Phone number", value: "(815) 672-5345" }
    sleep_after_phone: 1000

    fill_stripe_iframe:
      card_number: '4242424242424242'
      expiry: '02/45'
      cvc: '345'
      card_name: 'linda 4650'
      zipcode: '90021'
    sleep_step: 1000

    R_click_place_order_2: { role: "button", name: "Place order" }

    # Wait for order confirmation page to load ("Access Your Order" button appears)
    wait_for_access_order_button: { role: 'button', name: 'Access Your Order', timeout: 20000 }
    sleep_step: 2000

    verify_note_on_order_placed: { text: 'Thanks for your payment!' }
    sleep_end: 3000

  expect_result:
    assertions:
      - assertion_type: "element_visible_by_text"
        text: "Thanks for your payment!"
