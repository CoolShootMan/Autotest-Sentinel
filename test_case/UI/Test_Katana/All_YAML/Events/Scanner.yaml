# --- Concurrency Stress Test (10 Threads) ---
testT3981_Concurrency_01:
    is_mobile: true
    video_index: 1
    description: "Concurrent Scan Worker 01"
    test_step:
        open: "https://s.pear.us/AspxjH"
        sleep_wait_for_scan: 5000
        verify_verified: { text: "Code Verified", timeout: 25000 }
