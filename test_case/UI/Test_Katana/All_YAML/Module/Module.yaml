#--------- Module - Create / Edit / Deteletd / Rearrange / Show / Collapse -------------
testT3554:
    description: "Verify adding a new module in shop page"
    test_step:
        open: "https://release.pear.us/autotestshop"
        swipe_avoid_plus: { x: 0, y: 300 }
        sleep_after_open: 5000
        R_click3: { role: 'button', name: 'Module' }
        fill1: { role: 'textbox', name: 'Enter title of the module', value: 'Verify Add module' }
        R_click_continue: { role: 'button', name: 'Continue' }
        R_click4: { role: 'button', name: 'Add' }
        sleep_wait_product: 5000
        R_click5: { locator: "div[data-track-location='Dialog']  button[data-testid='mui-card-action-area']" }
        R_click7: { locator: "button[data-track-location='Dialog']", name: 'Add', index: -1 }
        sleep_before_verify: 2000
    expect_result:
        description: "Verify that the new module is visible on the page"
        assertions:
            - assertion_type: "element_visible_by_text"
              text: "Verify Add module"

testT3556:
    description: "Verify editing an existing module"
    test_step:
        open: "https://release.pear.us/autotestshop"
        sleep_after_open: 3000
        click_module_edit_button: { module_name: 'Verify Add module' }
        sleep_after_edit_click: 1500
        R_click_edit_module: { role: 'button', name: 'Edit module' }
        sleep_after_edit_module: 1000
        fill_module_title: { role: 'textbox', name: 'Enter title of the module', value: 'Updated module' }
        R_click_vertical_scroll: { text: 'Vertical Scroll', index: 0 }
        sleep_before_save: 1000
        R_click_save: { role: 'button', name: 'Save' }
        sleep_after_save: 3000
    expect_result:
        description: "Module should be edited successfully"
        assertions:
            - { assertion_type: "element_visible_by_text", text: "Updated module", exact: false }

testT3577:
    description: "Verify that curator modifies the sorting of module and the sorting of module contents"
    test_step:
        open: "https://release.pear.us/autotestshop"
        sleep_after_open: 3000
        R_click_1: { locator: 'button[data-testid="enhance-button"]', name: 'Rearrange', exact: true }
        sleep_after_click: 3000
        drag_element_1: 
            source_locator: 'div[aria-describedby="DndDescribedBy-0"]:nth-child(2) svg'
            target_locator: 'div[aria-describedby="DndDescribedBy-0"]:nth-child(1) svg'
        sleep_drag_element: 5000
        R_click_save: { role: 'button', name: 'Save' }
        sleep_after_save: 3000

    expect_result:
        description: "Module sorting and module contents sorting should be modified successfully"
        assertions:
            - { assertion_type: "element_visible_by_text", text: "The storefront has been updated!" }

testT4903:
    description: "Verify two methods that can convert the module to the draft state"
    test_step:
        open: "https://release.pear.us/autotestshop"
        sleep_after_open: 3000
        click_module_edit_button: { module_name: 'Updated module' }
        R_click_hide_module: { role: 'button', name: 'Hide module' }
        sleep_after_hide_module: 2000
        click_confirm_button: { locator: "[role='dialog'] [data-track-location='Dialog']", name: 'Hide' , exact: true}
        sleep_after_confirm: 5000
        verify_element_style: {container: 'Updated module', container_filter: '../..', locator: '>div:nth-child(2)>div', property: 'opacity', expected: '0.7' }
        click_module_edit_button2: { module_name: 'Updated module' }
        R_click_show_module: { role: 'button', name: 'Show module' }
    expect_result:
        description: "Verify that the module is hidden successfully"
        assertions:
            - assertion_type: "element_visible_by_text"
              text: []

testT4622:
    description: "Verify module collapse and expand toggle functionality"
    test_step:
        open: "https://release.pear.us/autotestshop"
        swipe_avoid_plus: { x: 0, y: 300 }
        sleep_after_open: 5000

        # Prerequisite: Create module (from testT3554)
        R_click_create_module: { role: 'button', name: 'Module' }
        fill_module_title: { role: 'textbox', name: 'Enter title of the module', value: 'Verify Add module' }
        R_click_continue: { role: 'button', name: 'Continue' }
        R_click_add: { role: 'button', name: 'Add' }
        sleep_wait_product: 5000
        R_click_select_product: { locator: "div[data-track-location='Dialog']  button[data-testid='mui-card-action-area']" }
        R_click_add_product: { locator: "button[data-track-location='Dialog']", name: 'Add', index: -1 }
        sleep_after_create: 3000

        # Prerequisite: Rename module to "Updated module" (from testT3556)
        click_module_edit_button: { module_name: 'Verify Add module' }
        sleep_after_edit_click: 1500
        R_click_edit_module: { role: 'button', name: 'Edit module' }
        sleep_after_edit_module: 1000
        fill_new_title: { role: 'textbox', name: 'Enter title of the module', value: 'Updated module' }
        R_click_vertical_scroll: { text: 'Vertical Scroll', index: 0 }
        sleep_before_save: 1000
        R_click_save: { role: 'button', name: 'Save' }
        sleep_after_save: 3000

        # Step 1: Click collapse icon (arrow-up) to fold module content
        click_module_collapse: { module_name: "Updated module" }
        sleep_after_collapse: 1500
        # 直击本质的断言 1：验证整个模块的物理高度已坍塌（小于150px）
        verify_module_collapsed: { module_name: "Updated module" }
        # Step 2: Click expand icon (arrow-up-icon依然是那个节点)
        click_module_expand: { module_name: "Updated module" }
        sleep_after_expand: 1500
        # 直击本质的断言 2：验证整个模块的物理高度已恢复（大于150px）
        verify_module_expanded: { module_name: "Updated module" }

    expect_result:
        description: "Module should collapse then expand correctly"
        assertions: []

testT3555:
    description: "Verify module delete functionality"
    test_step:
        open: "https://release.pear.us/autotestshop"
        sleep_after_open: 3000
        #Click module button to trigger post creation flow
        click_module_add_new: { module_name: 'Updated module' }
        R_click_no: { locator: "button[data-track-location='Dialog']", name: 'No', exact: true }
        sleep_after_add: 5000
        if_discard_drawer:
            condition:
                role: "button"
                name: "Discard"
            then:
                click_discard: { role: "button", name: "Discard" }
                sleep_after_discard: 1500
        click_enhance_button: { test_id: 'enhance-button-cta' }
        sleep_after_enhance_click: 2000
        # Select media items (first two)
        click_media_icon_1: { locator: 'div[data-testid="shop-brand"]' }
        click_media_icon_2: { locator: 'div[data-testid="shop-brand"]', index: 1 }
        # Add products
        R_click_add_products: { locator: "button[data-track-location='Dialog']", name: 'Add 2/20 product(s)', exact: true }
        sleep_after_add_products: 1000
        auto_handle_modals_1: { timeout: 10000, ignore_if_not_found: true, max_iterations: 3 }
        # Switch to Content tab
        R_click_content_tab: { role: 'tab', name: 'Content' }

        # Fill post title
        fill_post_title: { role: 'textbox', name: 'Pick a bold title for your', value: 'Test - add new post for deletion' }
        # Confirm and publish
        click_confirm_button: { test_id: 'confirm-button' }
        R_click_publish: { role: 'button', name: 'Publish' }
        sleep_after_publish: 3000
        R_click_got_it: { role: 'button', name: 'Got it' }
        sleep_after_got_it: 5000
        auto_handle_modals: { timeout: 10000, ignore_if_not_found: true, max_iterations: 3 }
        click_module_post_view_event_cta: { module_name: 'Updated module', post_title: 'Test - add new post for deletion', button_index: -1 }
        R_click_edit_post_muen: { role: "button", name: 'Remove from this module', exact: true }
        R_click_confirm_button: { locator: "button[data-track-location='Dialog']", name: 'Remove', exact: true }
        sleep_after_click_event: 2000
        click_module_edit_button: { module_name: 'Updated module' }
        R_click_delete_module: { role: 'button', name: 'Delete module' }
        sleep_after_delete_click: 1500
        click_confirm_button_1: { locator: "[role='dialog'] [data-track-location='Dialog']", name: 'Delete' , exact: true}
        sleep_after_confirm: 5000
    expect_result:
        description: "Verify that the module is deleted successfully"
        assertions:
            - assertion_type: "element_visible_by_text"
              text: "Delete module success"

